<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Admin - EAS HOBBIES</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/wFY6Tn2y/7-F.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .admin-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #764ba2;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(118, 75, 162, 0.3);
        }
        
        .clear-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4757 100%);
            margin-top: 10px;
        }
        
        .clear-btn:hover {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
        }
        
        .current-status {
            margin-top: 25px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            text-align: left;
        }
        
        .current-status h3 {
            color: #764ba2;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-active {
            background: #4caf50;
            color: white;
        }
        
        .status-inactive {
            background: #ff4757;
            color: white;
        }
        
        .preview {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f0ff 0%, #ffe6f0 100%);
            border-radius: 15px;
            display: none;
        }
        
        .preview.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .preview-message {
            font-size: 1rem;
            font-weight: bold;
            color: #764ba2;
            word-break: break-word;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #764ba2;
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .password-protected {
            margin-bottom: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 12px;
            border-left: 4px solid #ffc107;
        }
        
        .admin-only {
            display: none;
        }
        
        .admin-only.show {
            display: block;
        }
        
        @media (max-width: 480px) {
            .admin-card {
                padding: 25px;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-card">
        <i class="fas fa-crown" style="font-size: 50px; color: #764ba2; margin-bottom: 15px;"></i>
        <h1>🎂 Birthday Admin Panel 🎂</h1>
        <p class="subtitle">Set a public birthday message for everyone visiting the site!</p>
        
        <div class="password-protected">
            <i class="fas fa-lock"></i> Admin Access Required
            <input type="password" id="adminPassword" placeholder="Enter admin password" style="margin-top: 10px;">
            <button id="unlockBtn" style="margin-top: 10px; background: #ffb347;">Unlock</button>
        </div>
        
        <div id="adminControls" class="admin-only">
            <div class="input-group">
                <label><i class="fas fa-user"></i> Person's Name *</label>
                <input type="text" id="personName" placeholder="e.g., Yusif, Farhad, Kenan" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-calendar-alt"></i> Age (optional)</label>
                <input type="number" id="personAge" placeholder="e.g., 14" min="1" max="100">
            </div>
            
            <div class="input-group">
                <label><i class="fas fa-message"></i> Special Message (optional)</label>
                <textarea id="specialMessage" placeholder="e.g., Best DJ ever! 🎧"></textarea>
            </div>
            
            <button id="activateBirthdayBtn">
                <i class="fas fa-gift"></i> Activate Birthday Surprise
            </button>
            
            <button id="deactivateBirthdayBtn" class="clear-btn">
                <i class="fas fa-trash"></i> Deactivate Birthday Surprise
            </button>
            
            <div class="current-status" id="currentStatus">
                <h3>📊 Current Status</h3>
                <div id="statusInfo">Loading...</div>
            </div>
            
            <div class="preview" id="preview">
                <div class="preview-message" id="previewMessage"></div>
            </div>
        </div>
        
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Main Page
        </a>
    </div>
    
    <script>
        const BIRTHDAY_STORAGE_KEY = "eas_public_birthday";
        const ADMIN_PASSWORD = "Json"; // Change this to your own password!
        
        function checkAdminAccess() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                document.getElementById('adminControls').classList.add('show');
                document.querySelector('.password-protected').style.display = 'none';
                loadCurrentBirthday();
            } else {
                alert('❌ Incorrect password!');
            }
        }
        
        document.getElementById('unlockBtn').addEventListener('click', checkAdminAccess);
        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAdminAccess();
        });
        
        function loadCurrentBirthday() {
            const saved = localStorage.getItem(BIRTHDAY_STORAGE_KEY);
            const statusDiv = document.getElementById('statusInfo');
            const previewDiv = document.getElementById('preview');
            const previewMessage = document.getElementById('previewMessage');
            
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.active) {
                        let message = `🎉 HAPPY BIRTHDAY ${data.name.toUpperCase()}! 🎉`;
                        if (data.age) {
                            message = `🎂 HAPPY ${data.age}th BIRTHDAY ${data.name.toUpperCase()}! 🎂`;
                        }
                        if (data.message) {
                            message += ` ✨ ${data.message} ✨`;
                        }
                        
                        statusDiv.innerHTML = `
                            <span class="status-badge status-active">ACTIVE</span>
                            <p style="margin-top: 10px;"><strong>${data.name}</strong>${data.age ? ` (${data.age} years old)` : ''}</p>
                            <p style="font-size: 0.85rem; color: #666;">${data.message || 'No special message'}</p>
                            <p style="font-size: 0.75rem; color: #999; margin-top: 8px;">Updated: ${new Date(data.updated).toLocaleString()}</p>
                        `;
                        
                        previewMessage.innerHTML = message;
                        previewDiv.classList.add('show');
                        
                        // Fill inputs for editing
                        document.getElementById('personName').value = data.name;
                        document.getElementById('personAge').value = data.age;
                        document.getElementById('specialMessage').value = data.message || '';
                    } else {
                        statusDiv.innerHTML = `<span class="status-badge status-inactive">INACTIVE</span><p style="margin-top: 10px;">No active birthday celebration</p>`;
                        previewDiv.classList.remove('show');
                    }
                } catch(e) {
                    statusDiv.innerHTML = '<span class="status-badge status-inactive">INACTIVE</span>';
                }
            } else {
                statusDiv.innerHTML = '<span class="status-badge status-inactive">INACTIVE</span><p style="margin-top: 10px;">No active birthday celebration</p>';
            }
        }
        
        function updatePreview() {
            const name = document.getElementById('personName').value.trim();
            const age = document.getElementById('personAge').value.trim();
            const message = document.getElementById('specialMessage').value.trim();
            const previewDiv = document.getElementById('preview');
            const previewMessage = document.getElementById('previewMessage');
            
            if (name) {
                let birthdayText = `🎉 HAPPY BIRTHDAY ${name.toUpperCase()}! 🎉`;
                if (age) {
                    birthdayText = `🎂 HAPPY ${age}th BIRTHDAY ${name.toUpperCase()}! 🎂`;
                }
                if (message) {
                    birthdayText += ` ✨ ${message} ✨`;
                }
                previewMessage.innerHTML = birthdayText;
                previewDiv.classList.add('show');
            } else {
                previewDiv.classList.remove('show');
            }
        }
        
        document.getElementById('personName').addEventListener('input', updatePreview);
        document.getElementById('personAge').addEventListener('input', updatePreview);
        document.getElementById('specialMessage').addEventListener('input', updatePreview);
        
        function saveBirthday(data) {
            localStorage.setItem(BIRTHDAY_STORAGE_KEY, JSON.stringify(data));
            loadCurrentBirthday();
            
            // Also broadcast to other tabs
            window.localStorage.setItem('birthday_update', Date.now().toString());
            window.localStorage.removeItem('birthday_update');
        }
        
        document.getElementById('activateBirthdayBtn').addEventListener('click', function() {
            const name = document.getElementById('personName').value.trim();
            
            if (!name) {
                alert('❌ Please enter a name!');
                return;
            }
            
            const birthdayData = {
                active: true,
                name: name,
                age: document.getElementById('personAge').value.trim(),
                message: document.getElementById('specialMessage').value.trim(),
                updated: new Date().toISOString()
            };
            
            saveBirthday(birthdayData);
            
            this.innerHTML = '<i class="fas fa-check"></i> Activated! 🎉';
            setTimeout(() => {
                this.innerHTML = '<i class="fas fa-gift"></i> Activate Birthday Surprise';
            }, 2000);
        });
        
        document.getElementById('deactivateBirthdayBtn').addEventListener('click', function() {
            if (confirm('Are you sure you want to deactivate the birthday surprise?')) {
                const birthdayData = {
                    active: false,
                    name: '',
                    age: '',
                    message: '',
                    updated: new Date().toISOString()
                };
                saveBirthday(birthdayData);
                
                this.innerHTML = '<i class="fas fa-check"></i> Deactivated!';
                setTimeout(() => {
                    this.innerHTML = '<i class="fas fa-trash"></i> Deactivate Birthday Surprise';
                }, 2000);
            }
        });
        
        // Try to load if already unlocked (in case password was saved)
        if (localStorage.getItem('birthday_admin_unlocked') === 'true') {
            document.getElementById('adminControls').classList.add('show');
            document.querySelector('.password-protected').style.display = 'none';
            loadCurrentBirthday();
        }
    </script>
</body>
</html>
